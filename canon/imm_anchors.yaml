  - "Adaptive immune cells (CD4+, CD8+, Treg, B cell, plasma cell, memory T, memory B, γδ T)"
  - "Pro-inflammatory cytokines (TNF-α, IL-1β, IL-6, IFN-γ, IL-17)"
  - "Regulatory cytokines (IL-10, TGF-β, IL-35)"
  - "Th-polarizing cytokines (IL-4, IL-12, IL-23, IL-21)"
  - "Vaccine platforms (mRNA, viral vector, inactivated, live attenuated, subunit, conjugate)"
  - "Neuroimmune interface states (healthy, acute, chronic, intermediate)"
  - "PNI paradigms (resilient, acute stressors, chronic stressors, clinical PNI)"
  - "Organ-specific autoimmune diseases (T1D, MS, Hashimoto's, myasthenia gravis, celiac)"
  - "Systemic autoimmune diseases (SLE, RA, scleroderma, Sjögren's)"
  - "Overlap autoimmune (MCTD, dermatomyositis, anti-synthetase)"

