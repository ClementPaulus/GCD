# canon/imm_anchors.yaml
# Immunology Canon Anchors — UMCP.CANON.IMM.v1
# Cross-references: closures/immunology/
schema: canon.domain_anchors.schema.json
id: "UMCP.CANON.IMM.v1"
version: "1.0.0"
domain: "Immunology"
hierarchy: "GCD > IMM (Tier-2)"
description: >
  Canon anchors for the immunology domain closure.
  Maps 76 entities across 6 sub-closures (immune cells, cytokines,
  vaccines, autoimmune diseases, neuroimmune bridge, PNI) to
  8-channel trace vectors. Each sub-closure uses domain-specific
  channels grounded in immunological measurements. 36 theorems
  proven (T-IC-1–6, T-CY-1–6, T-VR-1–6, T-AI-1–6, T-NI-1–6,
  T-PNI-1–6).

axioms:
  - id: "AX-IMM0"
    name: "Immune Duality"
    statement: >
      Every immune entity partitions its functional budget
      exhaustively: what the system retains (F) + what it
      loses to collapse (ω) = 1. High F means robust immune
      function; high ω means immunological compromise. No third
      reservoir exists.
    frozen: true

  - id: "AX-IMM1"
    name: "Innate-Adaptive Split (T-IC-1)"
    statement: >
      Innate and adaptive immune arms occupy distinct regions
      of the kernel manifold. The adaptive arm shows higher
      mean fidelity than innate, reflecting the greater
      specificity and memory capacity of adaptive immunity.
    frozen: true

  - id: "AX-IMM2"
    name: "Cytokine Storm Signature (T-CY-2)"
    statement: >
      Pro-inflammatory cytokines occupy higher drift (ω) regions
      than regulatory cytokines. Regulatory cytokines (IL-10,
      TGF-β, IL-35) cluster in Watch/Stable regimes, while
      pro-inflammatory mediators (TNF-α, IL-1β, IL-6) show
      higher collapse proximity.
    frozen: true

  - id: "AX-IMM3"
    name: "Vaccine Platform Hierarchy (T-VR-1)"
    statement: >
      Vaccine platforms stratify by mean fidelity: live-attenuated
      and viral-vector platforms achieve higher F than inactivated
      or subunit platforms, reflecting their broader immune
      activation signatures.
    frozen: true

  - id: "AX-IMM4"
    name: "Autoimmune Geometric Slaughter (T-AI-3)"
    statement: >
      Systemic autoimmune diseases exhibit the largest
      heterogeneity gap (Δ = F − IC) among autoimmune categories,
      driven by channel heterogeneity. High self-antigen breadth
      combined with variable treatment responsiveness creates
      geometric slaughter of multiplicative coherence.
    frozen: true

symbols:
  - name: "F"
    tier: 1
    definition: "Fidelity — immune functional retention"
  - name: "IC"
    tier: 1
    definition: "Integrity composite — multiplicative coherence across 8 channels"
  - name: "Treg"
    tier: 2
    definition: "Regulatory T cells — maps to regulatory_capacity channel"
  - name: "ICS"
    tier: 2
    definition: "Intracellular cytokine staining — informs effector potency"

