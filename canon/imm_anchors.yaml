anchors:
  IMM-A1:
    name: "Memory CD8+ T cell"
    description: "High fidelity adaptive cell — strong memory formation and effector potency"
    regime: "Stable"
  IMM-A2:
    name: "TNF-alpha"
    description: "Master pro-inflammatory cytokine — high drift, pleiotropic effects"
    regime: "Watch"
  IMM-A3:
    name: "mRNA COVID-19 vaccine (BNT162b2)"
    description: "High humoral + cellular efficacy — novel platform anchor"
    regime: "Watch"
  IMM-A4:
    name: "Systemic Lupus Erythematosus"
    description: "Systemic autoimmune — high antigen breadth, large heterogeneity gap"
    regime: "Collapse"
  IMM-A5:
    name: "IL-10"
    description: "Master regulatory cytokine — suppresses inflammation, high feedback"
    regime: "Watch"
  IMM-A6:
    name: "Natural Killer cell"
    description: "Innate immune sentinel — rapid effector, limited memory"
    regime: "Watch"
  IMM-A7:
    name: "Young healthy (neuroimmune)"
    description: "Intact BBB, quiescent microglia, preserved neurotransmission — neuroimmune baseline"
    regime: "Watch"
  IMM-A8:
    name: "Sepsis encephalopathy"
    description: "Acute neuroimmune crisis — BBB breakdown, cytokine storm in CNS"
    regime: "Collapse"
  IMM-A9:
    name: "Secure attachment (PNI)"
    description: "Resilient PNI state — coherent emotional regulation, robust immune function"
    regime: "Watch"
  IMM-A10:
    name: "Burnout syndrome"
    description: "Chronic PNI collapse — lowest IC among stressors, total allostatic overload"
    regime: "Collapse"

categories:
