schema: schemas/contract.schema.json
contract:
  id: CONS.INTSTACK.v1
  version: 1.0.0
  timezone: UTC
  parent_contract: GCD.INTSTACK.v1
  tier_level: 2
  embedding:
    interval: [0.0, 1.0]
    face: pre_clip
    oor_policy: clip_and_flag
    epsilon: 1.0e-08
  tier_1_kernel:
    reserved_symbols:
      # === GCD Tier-1 invariants (inherited, frozen) ===
      - omega
      - F
      - S
      - C
      - tau_R
      - kappa
      - IC
      - IC_min
      # === Consciousness Coherence channel observables (8 channels) ===
      - harmonic_ratio           # Proximity of frequency ratios to ξ_J = 7.2
      - recursive_depth          # Depth of demonstrated self-referential structure
      - return_fidelity          # τ_R finiteness: does the system re-enter?
      - spectral_coherence       # Power spectrum concentration vs uniform noise
      - phase_stability          # Phase-locking across cycles / oscillators
      - information_density      # Bits per symbol in the system's encoding
      - temporal_persistence     # Duration of coherent state maintenance
      - cross_scale_coupling     # Coherence preserved across spatial/temporal scales
      # === Domain-specific parameters (Tier-2, NOT frozen) ===
      - xi_J                     # Jackson's harmonic ratio 432/60 = 7.2
      - phi_sq_e                 # φ²·e ≈ 7.1166 (1.16% proximity to ξ_J)
    weights_policy: nonnegative_sum_to_one
    frozen_parameters:
      # === GCD inherited (frozen) ===
      p: 3
      alpha: 1.0
      lambda: 0.2
      eta: 0.001
      alpha_energy: 1.0
      beta_energy: 0.5
      tau_0: 10.0
      C_crit: 0.2
      # === Consciousness Coherence domain parameters ===
      n_coherence_channels: 8
      # NOTE: xi_J = 7.2 is a Tier-2 domain parameter used for
      # harmonic_ratio channel computation. It is NOT a Tier-1
      # frozen constant. It is the ratio 432/60 from Jackson's
      # harmonic framework.
    tolerances:
      tol_seam: 0.005
      tol_id: 1.0e-09
      tol_coherence: 0.05            # 5% tolerance for coherence estimates
      tol_harmonic: 0.02             # 2% for harmonic ratio proximity
  axioms:
    # === GCD Tier-1 inherited ===
    - id: AX-0
      statement: Collapse is generative
      description: |
        Inherited from GCD Tier-1 (frozen). In consciousness coherence,
        oscillatory collapse (neural binding, phase resets, attentional
        selection) generates coherent representations from distributed
        activity. Each collapse-return cycle is a moment of integration.
    - id: AX-1
      statement: Boundary defines interior
      description: |
        Inherited from GCD Tier-1 (frozen). The system's coherence
        boundary (neural, harmonic, mathematical) defines what is
        "inside" the integrating process. Systems with different
        boundaries produce different coherence profiles.
    - id: AX-2
      statement: Entropy measures determinacy
      description: |
        Inherited from GCD Tier-1 (frozen). Bernoulli field entropy of the
        8-channel trace measures how determined the coherence profile is.
        Low S = highly coherent specialist; high S = distributed.
    # === Consciousness Coherence domain axioms ===
    - id: AX-CC0
      statement: Harmonic ratio does not privilege coherence
      description: |
        The harmonic_ratio channel (proximity to ξ_J = 7.2) has
        correlation ρ < 0.30 with IC across the 20-system catalog.
        No single frequency ratio is privileged for consciousness;
        coherence is a multi-channel property (T-CC-1).
    - id: AX-CC1
      statement: Tuning is invariant under frequency transposition
      description: |
        A=432 Hz and A=440 Hz produce statistically indistinguishable
        kernel outputs when routed through the 8-channel trace. Tuning
        is a gauge choice, not a structural invariant (T-CC-5).
  regime_classification:
    energy:
      low:
        threshold: 0.01
        condition: "E < 0.01"
      medium:
        threshold: 0.05
        condition: "0.01 ≤ E < 0.05"
      high:
        threshold: null
        condition: "E ≥ 0.05"
    collapse:
      minimal:
        threshold: 0.01
        condition: "Φ_collapse < 0.01"
      active:
        threshold: 0.1
        condition: "0.01 ≤ Φ_collapse < 0.1"
      critical:
        threshold: null
        condition: "Φ_collapse ≥ 0.1"
    coherence:
      high:
        threshold: 0.80
        condition: "IC/F > 0.80"
      moderate:
        threshold: 0.40
        condition: "0.40 ≤ IC/F ≤ 0.80"
      low:
        threshold: null
        condition: "IC/F < 0.40"
  mathematical_identities:
    - name: Fidelity-drift duality
      formula: "F = 1 - ω"
      tolerance: 1.0e-09
    - name: Integrity-collapse relation
      formula: "IC ≈ exp(κ)"
      tolerance: 1.0e-06
    - name: Integrity bound
      formula: "IC ≤ F"
      tolerance: 1.0e-09
  typed_censoring:
    tau_R_special_values:
      - INF_REC
      - UNIDENTIFIABLE
    run_status_enum:
      - CONFORMANT
      - NONCONFORMANT
      - NON_EVALUABLE
    no_return_no_credit: true
  theorems:
    - id: T-CC-1
      name: Harmonic Non-Privilege (ρ < 0.30 vs IC)
    - id: T-CC-2
      name: Recursion-Return Dissociation
    - id: T-CC-3
      name: Universal Instability (0/20 reach Stable)
    - id: T-CC-4
      name: Geometric Slaughter
    - id: T-CC-5
      name: Tuning Invariance (432 Hz ≡ 440 Hz)
    - id: T-CC-6
      name: Mathematical Supremacy (abstract > harmonic)
    - id: T-CC-7
      name: Heterogeneity Gap Ordering
