schema: schemas/contract.schema.json
contract:
  id: SECURITY.INTSTACK.v1
  version: 1.0.0
  timezone: UTC
  parent_contract: GCD.INTSTACK.v1
  tier_level: 2
  embedding:
    interval: [0.0, 1.0]
    face: pre_clip
    oor_policy: clip_and_flag
    epsilon: 1.0e-08
  tier_1_kernel:
    reserved_symbols:
      # === GCD Tier-1 invariants (inherited, frozen) ===
      - omega
      - F
      - S
      - C
      - tau_R
      - kappa
      - IC
      - IC_min
      # === Security channel observables ===
      - file_integrity          # File hash validation score
      - malware_confidence      # Malware detection confidence
      - phishing_score          # Phishing/fraud detection score
      - auth_strength           # Authentication strength
      - pii_protection          # PII protection level
      - network_trust           # Network trust indicator
    weights_policy: nonnegative_sum_to_one
    frozen_parameters:
      # === GCD inherited (frozen) ===
      p: 3
      alpha: 1.0
      lambda: 0.2
      eta: 0.001
      alpha_energy: 1.0
      beta_energy: 0.5
      tau_0: 10.0
      C_crit: 0.2
      # === Security domain parameters ===
      n_channels: 6
    tolerances:
      tol_seam: 0.005
      tol_id: 1.0e-09
  axioms:
    # === GCD Tier-1 inherited ===
    - id: AX-0
      statement: Collapse is generative
      description: |
        Inherited from GCD Tier-1 (frozen). In security, trust collapse
        (breach, anomaly, authentication failure) is generative: it reveals
        attack vectors and strengthens validated defenses.
    - id: AX-1
      statement: Boundary defines interior
      description: |
        Inherited from GCD Tier-1 (frozen). The security perimeter (firewall
        rules, authentication policies, access controls) defines the trusted
        interior. Same traffic is trusted or blocked by boundary alone.
    - id: AX-2
      statement: Entropy measures determinacy
      description: |
        Inherited from GCD Tier-1 (frozen). Bernoulli field entropy of the
        security trace measures signal determinacy. Low S = clear threat
        classification; high S = ambiguous signals.
    # === Security domain axiom ===
    - id: AX-SEC0
      statement: What survives validation is trusted
      description: |
        Security validation maps to collapse-return: signals that return
        through the validation seam earn trust credit. Anomalies with
        tau_R = INF_REC receive zero trust.
  regime_classification:
    drift:
      stable:
        threshold: 0.038
        condition: "omega < 0.038"
      watch:
        threshold: 0.30
        condition: "0.038 <= omega < 0.30"
      collapse:
        threshold: null
        condition: "omega >= 0.30"
  mathematical_identities:
    - name: Fidelity-drift duality
      formula: "F = 1 - omega"
      tolerance: 1.0e-09
    - name: Integrity bound
      formula: "IC <= F"
      tolerance: 1.0e-09
    - name: Log-integrity relation
      formula: "IC = exp(kappa)"
      tolerance: 1.0e-06
  typed_censoring:
    tau_R_special_values:
      - INF_REC
      - UNIDENTIFIABLE
    run_status_enum:
      - CONFORMANT
      - NONCONFORMANT
      - NON_EVALUABLE
    no_return_no_credit: true
  notes: >
    SECURITY.INTSTACK.v1 extends GCD.INTSTACK.v1 for security domain validation.
    Applies UMCP tier architecture to security: anti-virus, anti-scam, identity,
    privacy. Core translation: "What returns through collapse is real" maps to
    "What survives validation is trusted". Security signals are embedded as
    standard GCD channels in [0,1]^n. F measures trust fidelity, omega measures
    threat drift, IC measures composite trust integrity. All Tier-1 symbols
    are standard GCD invariants — no symbol capture.
  extensions:
    domain: security
    domain_applications:
      - anti-virus (file integrity, malware detection)
      - anti-scam (phishing, fraud detection)
      - identity verification (authentication)
      - privacy (PII detection, data protection)
    domain_interpretation:
      F: "Trust fidelity — what fraction of security signals are clean"
      omega: "Threat drift — departure from trusted baseline"
      S: "Security entropy — uncertainty in threat classification"
      C: "Signal dispersion — heterogeneity across security channels"
      kappa: "Log-integrity of trust"
      IC: "Trust integrity composite — multiplicative trust coherence"
      tau_R: "Anomaly return time — how quickly trust is restored"
    validation_status:
      TRUSTED: "F >= 0.8 AND tau_R != INF_REC"
      SUSPICIOUS: "0.4 <= F < 0.8"
      BLOCKED: "F < 0.4 OR tau_R = INF_REC"
      NON_EVALUABLE: "Insufficient data"
